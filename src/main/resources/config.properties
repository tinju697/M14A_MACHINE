# =====================================================
# M14a API Automation - Runtime configuration
# Source: Machine_wise_Test_Cases_Consolidated 1.xlsx (M14a = "Remove battery Cap")
# APIs required: LOGIN, BIND, UNIT_PROCESS_CHECK, UNIT_PROCESS_COMMIT
# =====================================================
#
# WORKFLOW:
#   1. Suite launches FitMesWpfServer.exe (the WPF window).
#   2. You enter Port and Password in the WPF UI and click "Start Server".
#   3. Suite polls the socket and proceeds when it's listening.

# --- Server selection ---
# Set true to run an in-process stub EAP server (no FitMesWpfServer required).
# Set false to use the real FitMesWpfServer.exe configured below.
server.useStub=false

# --- FitMesWpfServer (used when server.useStub=false) ---
server.autoStart=true
server.exePath=F:\\E Drive\\MES Project- A31\\FitMesWpfServer 2\\FitMesWpfServer\\bin\\Debug\\net8.0-windows\\FitMesWpfServer.exe
server.workingDir=F:\\E Drive\\MES Project- A31\\FitMesWpfServer 2\\FitMesWpfServer\\bin\\Debug\\net8.0-windows
server.host=localhost
server.port=8003
server.startupTimeoutSec=120

# --- EAP API ---
api.baseUrl=http://localhost:8003/api/v1/EapApi/

# --- M14a station identity ---
# These are sent in every BIND / UNIT_PROCESS_CHECK / UNIT_PROCESS_COMMIT request.
# The Excel sheet uses E08-1FT-01 as the typical line code. Replace with the real
# values for the M14a equipment configuration if different.
m14a.lineCode=E08-1FT-01
m14a.sectionCode=TE060
m14a.stationCode=72607
m14a.serverVersion=v1.01

# --- Credentials ---
creds.valid.user=admin
creds.valid.pwd=admin
creds.invalid.user=pppp
creds.invalid.pwd=pppp
creds.wrongPwd.user=admin
creds.wrongPwd.pwd=WRONG_PWD
creds.noPermission.user=unauth_user
creds.noPermission.pwd=valid_pwd

# --- Test data ---
sn.valid=J21GYM001M100000US
sn.invalid=BAD-SN-XYZ
sn.malformed=C47233810508048520103891111

