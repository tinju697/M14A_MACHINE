# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  branches:
    include:
      - master
      - main
      - develop
      - feature/*

pr:
  branches:
    include:
      - master
      - main
      - develop

pool:
  vmImage: 'windows-latest'

variables:
  MAVEN_CACHE_FOLDER: $(Pipeline.Workspace)/.m2/repository
  MAVEN_OPTS: '-Dmaven.repo.local=$(MAVEN_CACHE_FOLDER)'

stages:
  - stage: Build_And_Test
    displayName: 'Build and Test'
    jobs:
      - job: Build
        displayName: 'Build, Test and Publish'
        timeoutInMinutes: 60
        steps:
          - task: JavaToolInstaller@0
            displayName: 'Install Java 11'
            inputs:
              versionSpec: '11'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'

          - task: Cache@2
            displayName: 'Cache Maven local repository'
            inputs:
              key: 'maven | "$(Agent.OS)" | **/pom.xml'
              restoreKeys: |
                maven | "$(Agent.OS)"
                maven
              path: $(MAVEN_CACHE_FOLDER)

          - task: Maven@4
            displayName: 'Maven compile'
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'clean compile'
              options: '-B $(MAVEN_OPTS)'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.11'
              mavenAuthenticateFeed: false
              effectivePomSkip: false

          - task: Maven@4
            displayName: 'Maven test (TestNG suite)'
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'test'
              options: '-B $(MAVEN_OPTS) -DsuiteXmlFile=testng.xml'
              publishJUnitResults: true
              testResultsFiles: '**/test-output/junitreports/TEST-*.xml'
              testRunTitle: 'M14a API TestNG Suite'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.11'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish TestNG HTML reports'
            condition: succeededOrFailed()
            inputs:
              targetPath: 'test-output'
              artifact: 'testng-reports'
              publishLocation: 'pipeline'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Excel test reports'
            condition: succeededOrFailed()
            inputs:
              targetPath: 'reports'
              artifact: 'excel-reports'
              publishLocation: 'pipeline'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish server logs'
            condition: succeededOrFailed()
            inputs:
              targetPath: 'logs'
              artifact: 'server-logs'
              publishLocation: 'pipeline'